<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Action Complete</title>

  <style>
    :root {
      --bg: #101218;
      --panel: #1b202b;
      --panel-soft: #242b38;
      --blue: #33b8ff;
      --blue-glow: rgba(51, 184, 255, 0.34);
      --text: #f6f8fb;
      --muted: #aab4c3;
      --line: rgba(255, 255, 255, 0.12);
      --success: #42d391;
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(51, 184, 255, 0.17), transparent 38rem),
        linear-gradient(180deg, #171b24 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: min(100%, 760px);
    }

    .card {
      background: rgba(27, 32, 43, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 42px;
      text-align: center;
      box-shadow:
        0 0 28px var(--blue-glow),
        0 24px 70px rgba(0, 0, 0, 0.38);
    }

    .success-icon {
      width: 76px;
      height: 76px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border: 4px solid var(--success);
      border-radius: 50%;
      color: var(--success);
      font-size: 2.8rem;
      font-weight: bold;
      box-shadow: 0 0 20px rgba(66, 211, 145, 0.28);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      letter-spacing: 0.02em;
    }

    .intro {
      max-width: 560px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.6;
    }

    .close-note {
      margin: 18px auto 0;
      color: var(--text);
      font-weight: bold;
    }

    .divider {
      height: 1px;
      margin: 34px 0 26px;
      background: var(--line);
    }

    h2 {
      margin: 0 0 16px;
      color: var(--blue);
      font-size: 1.1rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .project-button {
      min-height: 118px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 16px;
      border: 1px solid rgba(51, 184, 255, 0.42);
      border-radius: 16px;
      background: var(--panel-soft);
      color: var(--text);
      text-decoration: none;
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease;
    }

    .project-button:hover,
    .project-button:focus-visible {
      transform: translateY(-3px);
      background: #2a3444;
      border-color: var(--blue);
      box-shadow: 0 0 20px var(--blue-glow);
      outline: none;
    }

    .project-icon {
      font-size: 2rem;
    }

    .project-name {
      font-size: 1rem;
      font-weight: bold;
    }

    .footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    @media (max-width: 620px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 30px 20px;
      }

      .project-grid {
        grid-template-columns: 1fr;
      }

      .project-button {
        min-height: 82px;
        flex-direction: row;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <div class="success-icon">✓</div>

      <h1>Action Complete</h1>

      <p class="intro">
        Your action has been completed successfully.
      </p>

      <p class="close-note">
        You can now close this page.
      </p>

      <div class="divider"></div>

      <h2>Explore a project</h2>

      <div class="project-grid">
        <a class="project-button" href="https://cinaedvsstudios.github.io/Backroom-site/">
          <span class="project-icon">🔒</span>
          <span class="project-name">Backroom</span>
        </a>

        <a class="project-button" href="https://cinaedvsstudios.github.io/Organon/">
          <span class="project-icon">📜</span>
          <span class="project-name">Organon</span>
        </a>

        <a class="project-button" href="https://cinaedvsstudios.github.io/cinaedvs/">
          <span class="project-icon">✦</span>
          <span class="project-name">Cinaedvs</span>
        </a>
      </div>

      <p class="footer">
        More projects will appear here over time.
      </p>
    </section>
  </main>
</body>
</html>
